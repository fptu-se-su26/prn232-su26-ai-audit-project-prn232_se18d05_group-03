<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCare HIS - Đã đăng xuất</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#00478d",
            "on-primary": "#ffffff",
            "secondary": "#006a6a",
            "background": "#f7f9fb",
            "surface": "#f7f9fb",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f2f4f6",
            "on-surface": "#191c1e",
            "on-surface-variant": "#424752",
            "outline-variant": "#c2c6d4",
            "outline": "#727783",
            "secondary-container": "#8cf3f3",
            "on-secondary-container": "#007070"
          },
          fontFamily: { "body-md": ["Inter"], "label-md": ["Inter"], "headline-md": ["Inter"], "headline-lg": ["Inter"], "body-sm": ["Inter"], "label-sm": ["Inter"] },
          fontSize: {
            "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-8">
  <main class="max-w-md w-full text-center flex flex-col items-center gap-6 bg-surface-container-lowest border border-outline-variant rounded-xl p-10 shadow-sm">
    <div class="w-20 h-20 bg-secondary-container rounded-full flex items-center justify-center">
      <span class="material-symbols-outlined text-on-secondary-container" style="font-size:40px">check_circle</span>
    </div>
    <div>
      <h1 class="font-headline-md text-headline-md text-on-surface mb-2">Đăng xuất thành công</h1>
      <p class="font-body-md text-on-surface-variant">Phiên làm việc của bạn đã kết thúc. Cảm ơn bạn đã sử dụng SmartCare HIS.</p>
    </div>
    <div class="flex flex-col sm:flex-row gap-3 w-full">
      <a href="sign_in.html" class="flex-1 px-6 py-3 bg-primary text-on-primary rounded-lg font-label-md text-label-md text-center hover:bg-primary/90 transition-colors">
        Đăng nhập lại
      </a>
      <a href="index.html" class="flex-1 px-6 py-3 border border-outline-variant text-on-surface-variant rounded-lg font-label-md text-label-md text-center hover:bg-surface-container-low transition-colors">
        Về trang chủ
      </a>
    </div>
    <p class="font-label-sm text-label-sm text-outline">© 2024 SmartCare HIS. Bảo lưu mọi quyền.</p>
  </main>
</body>
</html>
